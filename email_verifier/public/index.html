<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verifier API</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #1a2235;
            --primary-glow: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 1px 1px rgba(14, 165, 233, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--primary-glow);
            letter-spacing: 0.5px;
        }
        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid #2e3c5a;
            background-color: #0f1523;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }
        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background-color: var(--primary-glow);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #0284c7;
        }
        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }
        #result-container {
            display: none;
            margin-top: 1.5rem;
        }
        pre {
            background-color: #0f1523;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #2e3c5a;
            overflow-x: auto;
            color: #38bdf8;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            margin: 0;
        }
        .loader {
            display: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email Verifier</h1>
        <p>Enter an email address below to test the verification API logic.</p>

        <form id="verify-form">
            <div class="input-group">
                <input type="email" id="email-input" placeholder="target@example.com" required>
                <button type="submit" id="submit-btn">Verify</button>
            </div>
        </form>

        <div class="loader" id="loader">Running SMTP and DNS checks...</div>

        <div id="result-container">
            <pre id="json-output"></pre>
        </div>
    </div>

    <script>
        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailInput = document.getElementById('email-input').value;
            const submitBtn = document.getElementById('submit-btn');
            const resultContainer = document.getElementById('result-container');
            const jsonOutput = document.getElementById('json-output');
            const loader = document.getElementById('loader');
            submitBtn.disabled = true;
            resultContainer.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: emailInput })
                });

                const data = await response.json();
                jsonOutput.textContent = JSON.stringify(data, null, 2);
                resultContainer.style.display = 'block';
            } catch (error) {
                jsonOutput.textContent = JSON.stringify({ error: "Failed to connect to the API." }, null, 2);
                resultContainer.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
